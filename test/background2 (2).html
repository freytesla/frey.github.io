、<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; }
  .wrap { position: relative; width: 100%; height: 100vh; background: #F9F8F2; overflow: hidden; border-radius: 0; }
</style>
<div class="wrap">
  <canvas id="c"></canvas>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrap = canvas.parentElement;
  const ACCENT = { r: 002, g: 154, b: 147 }; // 🔴 线条颜色 RGB
  let W, H, pts, tris, mouse = { x: -9999, y: -9999 };

  function resize() {
    W = canvas.width = wrap.clientWidth;
    H = canvas.height = wrap.clientHeight;
    init();
  }

  function dist2(a,b){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy;}
  function superTriangle(){const M=Math.max(W,H)*3;return[{x:-M,y:-M},{x:W/2,y:M},{x:W+M,y:-M}];}
  function circumcircle(a,b,c){const ax=a.x,ay=a.y,bx=b.x,by=b.y,cx=c.x,cy=c.y;const D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));if(Math.abs(D)<1e-10)return null;const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;const r2=(ax-ux)*(ax-ux)+(ay-uy)*(ay-uy);return{x:ux,y:uy,r2};}
  function delaunay(points){const st=superTriangle();const allPts=[...points,...st];let triangles=[{i:points.length,j:points.length+1,k:points.length+2}];for(let pi=0;pi<points.length;pi++){const p=allPts[pi];let edges=[],good=[];for(const t of triangles){const cc=circumcircle(allPts[t.i],allPts[t.j],allPts[t.k]);if(!cc){good.push(t);continue;}const dx=p.x-cc.x,dy=p.y-cc.y;if(dx*dx+dy*dy<cc.r2-1e-6){edges.push([t.i,t.j],[t.j,t.k],[t.k,t.i]);}else{good.push(t);}}const unique=[];for(let e=0;e<edges.length;e++){let dup=false;for(let f=0;f<edges.length;f++){if(e!==f&&edges[e][0]===edges[f][1]&&edges[e][1]===edges[f][0]){dup=true;break;}}if(!dup)unique.push(edges[e]);}for(const [a,b] of unique){good.push({i:pi,j:a,k:b});}triangles=good;}const stIdx=new Set([points.length,points.length+1,points.length+2]);return triangles.filter(t=>!stIdx.has(t.i)&&!stIdx.has(t.j)&&!stIdx.has(t.k));}

  function init() {
    // ==============================================
    // 🔴 关键变量：三角形大小（数值越大，三角形越大越少）
    const gridSize = 220;
    // ==============================================
    const cols = Math.floor(W / gridSize) + 2;
    const rows = Math.floor(H / gridSize) + 2;
    pts = [];

    for (let r = -1; r <= rows; r++) {
      for (let c = -1; c <= cols; c++) {
        // 🔴 点的随机偏移大小（越大越散）
        const jitter = 70;
        const jitterX = (Math.random() - 0.5) * jitter;
        const jitterY = (Math.random() - 0.5) * jitter;

        pts.push({
          x: c * (W / (cols-2)) + jitterX,
          y: r * (H / (rows-2)) + jitterY,
          ox: c * (W / (cols-2)) + jitterX,
          oy: r * (H / (rows-2)) + jitterY,
          phase: Math.random() * Math.PI * 2,
          speed: 0.4 + Math.random() * 0.6,
          amp: 22 + Math.random() * 18,
          t: Math.random() * 1000,
          vx: 0, // 缓动速度分量
          vy: 0
        });
      }
    }
    tris = delaunay(pts);
  }

  function update() {
    const now = Date.now() * 0.001;

    // ==============================================
    // 🔴 关键变量：鼠标阻尼 / 顺滑度
    // 越小 = 越丝滑、越迟钝
    // 越大 = 越灵敏、越生硬
    const damping = 0.15;
    // ==============================================

    for (const p of pts) {
      // 自然微动
      p.t += 0.012 * p.speed;
      let targetX = p.ox + Math.sin(p.t + p.phase) * p.amp;
      let targetY = p.oy + Math.cos(p.t * 0.85 + p.phase) * p.amp * 0.9;

      // ==============================================
      // 🔴 关键变量：鼠标推动点的感应范围（越大越远能推动）
      const mousePushRange = 260;
      // 🔴 关键变量：推动力度（越大推得越远）
      const pushStrength = 52;
      // ==============================================
      const mdx = p.x - mouse.x;
      const mdy = p.y - mouse.y;
      const md2 = mdx*mdx + mdy*mdy;
      if (md2 < mousePushRange*mousePushRange && md2 > 0.01) {
        const md = Math.sqrt(md2);
        const strength = (1 - md / mousePushRange) * pushStrength;
        targetX += (mdx / md) * strength;
        targetY += (mdy / md) * strength;
      }

      // 阻尼缓动（核心顺滑效果）
      p.vx += (targetX - p.x) * 0.3;
      p.vy += (targetY - p.y) * 0.3;
      p.vx *= damping;
      p.vy *= damping;
      p.x += p.vx;
      p.y += p.vy;
    }
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,W,H);

    for (const t of tris) {
      const a=pts[t.i],b=pts[t.j],c=pts[t.k]; if(!a||!b||!c)continue;
      const cx2=(a.x+b.x+c.x)/3, cy2=(a.y+b.y+c.y)/3;
      const mdx=cx2-mouse.x, mdy=cy2-mouse.y, md2=mdx*mdx+mdy*mdy;

      // ==============================================
      // 🔴 关键变量：三角形高亮感应范围
      const triangleHighlightRange = 280;
      // ==============================================
      const proximity = md2 < triangleHighlightRange*triangleHighlightRange ? (1-Math.sqrt(md2)/triangleHighlightRange) : 0;

      const baseAlpha = 0.58;
      const accentAlpha = baseAlpha + proximity * 0.16;

      ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.closePath();
      ctx.fillStyle = `rgba(${ACCENT.r},${ACCENT.g},${ACCENT.b}, 0.04)`;
      ctx.fill();

      // ==============================================
      // 🔴 关键变量：线条粗细（基础粗细 + 鼠标靠近变粗）
      const lineBaseWidth = 1.0;
      const lineHoverAdd = 0.5;
      // ==============================================
      ctx.strokeStyle = `rgba(${ACCENT.r},${ACCENT.g},${ACCENT.b},${accentAlpha})`;
      ctx.lineWidth = lineBaseWidth + proximity * lineHoverAdd;
      ctx.stroke();
    }

    for (const p of pts) {
      const mdx = p.x - mouse.x, mdy = p.y - mouse.y, md2 = mdx*mdx + mdy*mdy;
      // ==============================================
      // 🔴 关键变量：点的鼠标感应范围
      const dotRange = 180;
      // 🔴 关键变量：点的大小（基础大小 + 靠近变大）
      const dotBaseSize = 1.2;
      const dotHoverAdd = 2.2;
      // ==============================================
      const prox = md2 < dotRange*dotRange ? (1-Math.sqrt(md2)/dotRange) : 0;
      ctx.beginPath();
      ctx.arc(p.x,p.y, dotBaseSize + prox * dotHoverAdd ,0,Math.PI*2);
      ctx.fillStyle = `rgba(${ACCENT.r},${ACCENT.g},${ACCENT.b},${0.18 + prox * 0.4})`;
      ctx.fill();
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  wrap.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;});
  wrap.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
  wrap.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();mouse.x=e.touches[0].clientX-r.left;mouse.y=e.touches[0].clientY-r.top;},{passive:false});
  wrap.addEventListener('touchend',()=>{mouse.x=-9999;mouse.y=-9999;});
  window.addEventListener('resize',resize);
  resize();
  loop();
})();
</script>
