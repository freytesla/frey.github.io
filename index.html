<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frey的个人网站</title>
    <link rel="stylesheet" href="style.css?v=3">
    <!--字体-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
</head>
<body>
    <!--左上角名字-->
    <a class="brand" href="https://www.xiaohongshu.com/user/profile/61a1c707000000001000801d" target="_blank" rel="noopener noreferrer">FOLLOW FREY</a>

    <!--主文字-->
    <section class="hero">
        <p>Frey's website</p>
        <h1>coming soon</h1>
    </section>

    <div class="ball" id="ball">
        <div class="scene">
            <!-- 光晕环：主环正下方，字黑色模糊 -->
            <div class="ring ring-glow" id="ringGlow"></div>
            <!-- 外圆环（主环） -->
            <div class="ring" id="ring"></div>
            <!-- 内圆环（与主环成18°夹角） -->
            <div class="ring ring2" id="ring2"></div>
        </div>
    </div>

    <script src="script.js?v=3"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // 将 h1 拆成两个词的 span
        const h1 = document.querySelector('.hero h1');
        h1.innerHTML = '<span class="word" style="display:inline-block">coming</span> <span class="word" style="display:inline-block">soon</span>';

        // GSAP 时间线
        const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

        // 1. "Frey's website" 淡入 + 轻微上移
        tl.from('.hero p', {
            y: 16,
            opacity: 0,
            duration: 0.9,
        })
        // 2. "coming" 和 "soon" 依次整词淡入
        .from('.hero h1 .word', {
            y: 20,
            opacity: 0,
            duration: 0.7,
            stagger: 0.2,
        }, '-=0.3');
    </script>
</body>
</html>
