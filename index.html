<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frey的个人网站</title>
    <link rel="stylesheet" href="style.css?v=6">

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 左上角 -->
    <a class="brand"
       href="https://www.xiaohongshu.com/user/profile/61a1c707000000001000801d"
       target="_blank"
       rel="noopener noreferrer">
       FOLLOW FREY
    </a>

    <!-- 主文字 -->
    <section class="hero">
        <p>Frey's website</p>
        <h1></h1>
    </section>

    <!-- 圆环 -->
    <div class="ball" id="ball">
        <div class="scene">
            <div class="ring ring-glow" id="ringGlow"></div>
            <div class="ring" id="ring"></div>
            <div class="ring ring2" id="ring2"></div>
        </div>
    </div>

<div class="frey-cursor"></div>

    <script src="script.js?v=6"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        const h1 = document.querySelector('.hero h1');

        h1.innerHTML = `
            <span class="word coming" style="display:inline-block">coming</span>

            <span class="swap-wrap" style="
                display:inline-block;
                position:relative;
                margin-left:0.18em;
            ">
                <span class="word soon" style="display:inline-block;">soon</span>

                <span class="strike" style="
                    position:absolute;
                    left:-5%;
                    top:54%;
                    width:115%;
                    height:12px;
                    background:#38868d;
                    transform:scaleX(0);
                    transform-origin:left center;
                    opacity:1;
                "></span>

                <span class="word slowly" style="
                    position:absolute;
                    left:0;
                    top:0;
                    opacity:0;
                    transform:translateY(28px);
                ">slowly</span>
            </span>
        `;

        const tl = gsap.timeline({
            defaults:{ ease:"power3.out" }
        });

        // Frey's website
        tl.from('.hero p',{
            y:16,
            opacity:0,
            duration:0.9
        })

        // coming
        .from('.coming',{
            y:22,
            opacity:0,
            duration:0.75
        },'-=0.25')

        // soon
        .from('.soon',{
            y:22,
            opacity:0,
            duration:0.75
        },'-=0.45')

        // soon 停留一会
        .to({},{
            duration:0.65
        })

        // 横线划过
        .to('.strike',{
            scaleX:1,
            duration:0.45,
            ease:'power2.out'
        })

        // 划线后再停留一会
        .to({},{
            duration:0.35
        })

        // soon + 横线一起消失
        .to(['.soon','.strike'],{
            y:-28,
            opacity:0,
            duration:0.45
        })

        // slowly 淡入
        .to('.slowly',{
            y:0,
            opacity:1,
            duration:0.55
        },'-=0.18');
    </script>

    
</body>
</html>
